baseURL = 'https://shasec.my.id/'
title = 'ShaSec'
disqusShortname = 'shasec'
enableRobotsTXT = true
defaultContentLanguage = 'id'
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 12
  path = 'page'

# ============================================================
# Multilingual — ID (default) + EN (/en/)
# ============================================================
[languages]
  [languages.id]
    weight = 1
    title = 'ShaSec'
    contentDir = 'content/id'
    [languages.id.params]
      locale = 'id'
      label = 'Indonesia'
      description = 'ShaSec — wawasan cybersecurity, threat intelligence, dan riset pertahanan.'
      tagline = 'Wawasan cybersecurity, threat intelligence, dan riset pertahanan.'
      organization = 'ShaSec'
      baseDomain = 'shasec.my.id'
      contactEmail = 'shaguardian24@gmail.com'
      ownerName = 'Syukra'
      legalName = 'ShaSec'
      region = 'Indonesia'
      jurisdiction = 'Indonesia'
      privacyUpdated = '15 Juli 2026'
      disclaimerUpdated = '15 Juli 2026'
    # Menu utama (rapi production): tanpa Categories di nav.
    # /categories/ tetap ada lewat badge artikel & sidebar.
    [languages.id.menus]
      [[languages.id.menus.main]]
        name = 'Beranda'
        pageRef = '/'
        weight = 1
      [[languages.id.menus.main]]
        name = 'Artikel'
        pageRef = '/articles/'
        weight = 2
      [[languages.id.menus.main]]
        name = 'Tools'
        pageRef = '/tools/'
        weight = 3
      [[languages.id.menus.main]]
        name = 'Tentang'
        pageRef = '/about/'
        weight = 4
      [[languages.id.menus.main]]
        name = 'Kontak'
        pageRef = '/contact/'
        weight = 5

  [languages.en]
    weight = 2
    title = 'ShaSec'
    contentDir = 'content/en'
    [languages.en.params]
      locale = 'en'
      label = 'English'
      description = 'ShaSec — cybersecurity insights, threat intelligence, and defense research.'
      tagline = 'Cybersecurity insights, threat intelligence, and defense research.'
      organization = 'ShaSec'
      baseDomain = 'shasec.my.id'
      contactEmail = 'shaguardian24@gmail.com'
      ownerName = 'Syukra'
      legalName = 'ShaSec'
      region = 'Indonesia'
      jurisdiction = 'Indonesia'
      privacyUpdated = '15 July 2026'
      disclaimerUpdated = '15 July 2026'
    [languages.en.menus]
      [[languages.en.menus.main]]
        name = 'Home'
        pageRef = '/'
        weight = 1
      [[languages.en.menus.main]]
        name = 'Articles'
        pageRef = '/articles/'
        weight = 2
      [[languages.en.menus.main]]
        name = 'Tools'
        pageRef = '/tools/'
        weight = 3
      [[languages.en.menus.main]]
        name = 'About'
        pageRef = '/about/'
        weight = 4
      [[languages.en.menus.main]]
        name = 'Contact'
        pageRef = '/contact/'
        weight = 5

# Google Analytics 4
# Set your Measurement ID (G-XXXXXXXXXX) to enable tracking.
# With the current immediate-load preference, the Hugo internal template loads GA on page view once an ID is set.
[services]
  [services.googleAnalytics]
    ID = 'G-WN592XKCP2'

# Shared params (forms, ads, search, cookie)
[params]
  disqusShortname = "shasec"
  # Default author for articles (override per-post: author / authors)
  # Sesuaikan nama/bio dengan identitas Anda.
  [params.author]
    # Ganti "name" dengan nama Anda jika ingin personal (bukan brand).
    name = 'Syukra'
    avatar = '/images/sha24.webp'
    url = '/about/'
    # role/bio dikosongkan → otomatis dari i18n (ID: Pengelola, EN: Operator)
    role = ''
    bio = ''
    # Sosial: username ATAU URL penuh
    linkedin = 'syukra-hadikasuma'          # → linkedin.com/in/username
    instagram = 'sha24org'         # → instagram.com/username
    github = 'SHA24-Cysec'            # → github.com/username

  [params.contact]
    formspreeId = 'meeyobrl'
    successMessage = ''
    errorMessage = ''
    pendingMessage = ''

  [params.subscribe]
    formspreeId = 'meeyobrl'
    successMessage = ''
    errorMessage = ''
    pendingMessage = ''

  [params.search]
    includeSections = ['articles']

  [params.cookieConsent]
    enabled = true

  [params.adsense]
    enabled = true
    # placeholder = true  → slot iklan hanya render kotak "Sponsored" (aman sebelum approval).
    # Setelah AdSense approved, ubah menjadi `placeholder = false` dan isi slots di bawah.
    placeholder = true
    testMode = false
    # Publisher ID (ca-pub-XXXXXXXXXXXXXXXX). Loader script AdSense akan otomatis
    # ter-inject di <head> selama nilai ini terisi — dibutuhkan untuk verifikasi
    # kepemilikan situs saat submit review AdSense.
    client = "ca-pub-2709528109709967"
    [params.adsense.slots]
      # Isi setelah approval dengan ID slot dari dashboard AdSense.
      # home    = "1234567890"
      # article = "1234567890"
      # sidebar = "1234567890"
      # feed    = "1234567890"

[taxonomies]
  category = 'categories'
  tag = 'tags'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
[markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true
  # Keep article punctuation literal; avoid typographic quote/dash substitution in rendered Markdown.
  [markup.goldmark.extensions]
    typographer = false
  [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        title = true
        block = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
[build]
  [build.buildStats]
    enable = true

[module]
  [module.hugoVersion]
    extended = true
    min = '0.128.0'
